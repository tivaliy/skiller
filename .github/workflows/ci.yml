name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (src + tests)
        run: npm run typecheck:test
      - name: Unit tests
        run: npm test
      - name: Build bundle
        run: npm run compile
